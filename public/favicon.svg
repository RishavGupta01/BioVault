<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>
  
  <!-- Outer glowing ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-dasharray="16 12" opacity="0.6"/>
  
  <!-- Main Shield Shape representing "Vault" -->
  <path d="M256,70 C340,70 410,100 410,100 C410,100 410,280 370,360 C330,440 256,470 256,470 C256,470 182,440 142,360 C102,280 102,100 102,100 C102,100 172,70 256,70 Z" 
        fill="url(#shieldGrad)" filter="url(#shadow)"/>
        
  <!-- Glowing Inner Shield Outline -->
  <path d="M256,95 C320,95 380,120 380,120 C380,120 380,270 345,340 C310,410 256,435 256,435 C256,435 202,410 167,340 C132,270 132,120 132,120 C132,120 192,95 256,95 Z" 
        fill="none" stroke="#ffffff" stroke-width="4" opacity="0.15"/>

  <!-- Molecular/DNA Cross Symbol inside -->
  <!-- Vertical Bar of the Cross -->
  <rect x="236" y="170" width="40" height="172" rx="20" fill="#ffffff" opacity="0.95"/>
  <!-- Horizontal Bar of the Cross -->
  <rect x="170" y="236" width="172" height="40" rx="20" fill="#ffffff" opacity="0.95"/>
  
  <!-- Biological Nodes representing Health Sync -->
  <circle cx="256" cy="150" r="16" fill="url(#accentGrad)" stroke="#ffffff" stroke-width="4"/>
  <circle cx="256" cy="362" r="16" fill="url(#accentGrad)" stroke="#ffffff" stroke-width="4"/>
  <circle cx="150" cy="256" r="16" fill="url(#accentGrad)" stroke="#ffffff" stroke-width="4"/>
  <circle cx="362" cy="256" r="16" fill="url(#accentGrad)" stroke="#ffffff" stroke-width="4"/>
  
  <!-- DNA strands connecting nodes -->
  <path d="M166,256 C200,220 312,292 346,256" fill="none" stroke="#ffffff" stroke-width="4" stroke-dasharray="6 4" opacity="0.4"/>
</svg>
